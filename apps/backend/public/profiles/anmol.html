<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <style>
        /* Basic CSS reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .profile-container {
            width: 300px;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        
        .profile-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .profile-bio {
            font-size: 14px;
            color: #777;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="images/Profile Picture.jpg" alt="Profile Image" class="profile-image">
        <h2 class="profile-name">Anmol Deep</h2>
        <p class="profile-bio">Web Developer passionate about creating interactive applications and experiences on the web. Loves coding, coffee, and cats.</p>
    </div>

    <footer>
        <style>
            footer {
                position: fixed;
                bottom: 5px;
                left: 5px;

                .text {
                    font-family: sans-serif;
                }
            }
        </style>
        <div class="text">
            Fulda University of Applied Sciences Software Engineering Project, Fall 2024. For Demonstration Only
        </div>
    </footer>

</body>
</html>
